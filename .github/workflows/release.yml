name: Build & Release Meridia

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@main
        with:
          bun-version: "1.x"

      - name: Install dependencies
        run: bun install

      - name: Sync version in package.json
        shell: powershell
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          $pkg.version = $version
          $pkg | ConvertTo-Json -Depth 100 | Set-Content package.json

      - name: Compile TypeScript + Vite
        run: bun run build

      - name: Package Electron app (unpacked)
        run: bun x electron-builder --win dir

      - name: Create placeholder icon if missing
        shell: powershell
        run: |
          if (!(Test-Path "build\icon.ico")) {
            New-Item -ItemType Directory -Force -Path build | Out-Null
            Invoke-WebRequest -Uri "https://raw.githubusercontent.com/electron/electron/main/shell/browser/resources/win/electron.ico" -OutFile "build\icon.ico"
          }

      - name: Create placeholder sidebar image if missing
        shell: powershell
        run: |
          if (!(Test-Path "build\installer-sidebar.bmp")) {
            New-Item -ItemType Directory -Force -Path build | Out-Null
            Add-Type -AssemblyName System.Drawing
            $bmp = [System.Drawing.Bitmap]::new(164, 314)
            $g = [System.Drawing.Graphics]::FromImage($bmp)
            $g.Clear([System.Drawing.Color]::FromArgb(30, 30, 30))
            $g.Dispose()
            $bmp.Save("build\installer-sidebar.bmp")
            $bmp.Dispose()
          }
        continue-on-error: true

      - name: Compile Inno Setup installer
        shell: powershell
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          $iss = Get-Content installer.iss -Raw
          $iss = $iss -replace '#define MyAppVersion ".*"', "#define MyAppVersion `"$version`""
          $iss = $iss -replace 'release\\{#MyAppVersion}\\win-unpacked', "release\$version\win-unpacked"
          $iss | Set-Content installer.iss
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: release/inno/*-Setup.exe
          if-no-files-found: error

  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@main
        with:
          bun-version: "1.x"

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            fuse \
            libfuse2

      - name: Install dependencies
        run: bun install

      - name: Sync version in package.json
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          bun run sync-version.ts "$VERSION"

      - name: Build Electron app (Linux)
        run: bun run build

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: release/**/*.AppImage
          if-no-files-found: error

  build-macos:
    name: Build (macOS)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@main
        with:
          bun-version: "1.x"

      - name: Install dependencies
        run: bun install

      - name: Sync version in package.json
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          bun run sync-version.ts "$VERSION"

      - name: Build Electron app (macOS)
        run: bun run build
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: release/**/*.dmg
          if-no-files-found: error

  release:
    name: Publish Release
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: artifacts/windows

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-build
          path: artifacts/linux

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-build
          path: artifacts/macos

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Meridia ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          generate_release_notes: true
          files: |
            artifacts/windows/**/*.exe
            artifacts/linux/**/*.AppImage
            artifacts/linux/**/*.deb
            artifacts/linux/**/*.rpm
            artifacts/macos/**/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
