name: Build Meridia (Windows EXE)

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python (node-gyp)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Enable corepack (npm)
        run: corepack enable

      - name: Install dependencies
        run: npm install --frozen-lockfile

      - name: Rebuild native modules for Electron
        run: npm rebuild

      - name: Build + Package (electron-builder)
        run: npm run package

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: meridia-windows
          path: |
            dist/**/*.exe
            dist/**/*.msi
            dist/**/*.zip
            dist/latest*.yml
            dist/*.blockmap

      - name: Create GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*.exe
            dist/**/*.msi
            dist/**/*.zip
            dist/latest*.yml
            dist/*.blockmap
