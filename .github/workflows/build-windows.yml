name: Build Meridia (Windows Inno Installer)

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Debug ref
        run: |
          echo ref=${{ github.ref }}
          echo ref_name=${{ github.ref_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python (node-gyp)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: npm ci

      - name: Build + Package (electron-builder)
        run: npm run package
        env:
          CI: false

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Set Inno version
        shell: pwsh
        run: |
          $refName = "${{ github.ref_name }}"
          if ($refName -match '^v') {
            $v = $refName.TrimStart('v')
          } else {
            $v = (node -p "require('./package.json').version")
          }
          "INNO_VERSION=$v" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build Installer (Inno Setup)
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (!(Test-Path $iscc)) { throw "ISCC not found at $iscc" }

          & $iscc ".\scripts\installer.iss" /DMyAppVersion=$env:INNO_VERSION

          Write-Host "Dist contents:"
          Get-ChildItem -Path .\dist -Recurse | Select-Object FullName

      - name: Upload artifacts (Inno + other dist)
        uses: actions/upload-artifact@v4
        with:
          name: meridia-windows
          path: |
            dist/meridia-setup-inno-*.exe
            dist/**/*.exe
            dist/**/*.msi
            dist/**/*.zip
            dist/latest*.yml
            dist/*.blockmap

      - name: Create GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Meridia ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            dist/meridia-setup-inno-*.exe
          fail_on_unmatched_files: true
