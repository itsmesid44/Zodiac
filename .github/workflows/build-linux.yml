name: Build Meridia (Linux AppImage)

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Debug ref
        run: |
          echo "ref=${GITHUB_REF}"
          echo "ref_name=${GITHUB_REF_NAME}"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build + Package (electron-builder)
        run: npm run package
        env:
          CI: false

      - name: Upload artifacts (Linux)
        uses: actions/upload-artifact@v4
        with:
          name: meridia-linux
          path: |
            dist/**/*.AppImage
            dist/**/*.deb
            dist/**/*.rpm
            dist/**/*.tar.gz
            dist/**/*.zip
            dist/latest*.yml
            dist/*.blockmap

      - name: Create GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Meridia ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            dist/*.AppImage
          fail_on_unmatched_files: false
